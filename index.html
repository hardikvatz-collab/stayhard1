<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stay Hard">
<meta name="theme-color" content="#141B16">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>STAY HARD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg:#141B16;
  --surface:#1D2820;
  --surface-2:#24352A;
  --line: rgba(243,241,231,0.08);
  --accent:#FF8A3D;
  --chalk2:#E4C86B;
  --text:#F3F1E7;
  --text-dim:#93A69A;
  --good:#7CC576;
  --danger:#E0605A;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding:20px 18px 60px;}

.header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
.header h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:26px;letter-spacing:1px;margin:0;}
.header .date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}

.tabs{display:flex;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:20px;border:1px solid var(--line);}
.tab{flex:1;text-align:center;padding:10px 0;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;color:var(--text-dim);border-radius:9px;cursor:pointer;transition:all .15s;}
.tab.active{background:var(--accent);color:#1A1006;}

.view{display:none;}
.view.active{display:block;}

/* ---- Workout view ---- */
.day-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;}
.day-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
.day-name{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;margin:2px 0 14px;}

.progress-track{height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin-bottom:16px;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .25s;}
.progress-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-bottom:14px;}

.ex-group-title{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--chalk2);text-transform:uppercase;margin:18px 0 8px;}
.ex-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
.ex-row:last-child{border-bottom:none;}
.check{width:26px;height:26px;border-radius:7px;border:2px solid var(--text-dim);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
.check.done{background:var(--good);border-color:var(--good);color:#0E1A0F;}
.ex-info{flex:1;}
.ex-name{font-size:14.5px;font-weight:500;}
.ex-name.done{text-decoration:line-through;color:var(--text-dim);}
.ex-reps{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}

.rest-msg{text-align:center;padding:40px 10px;color:var(--text-dim);font-family:'Oswald',sans-serif;font-size:18px;}

/* ---- Fuel view / Scoreboard ---- */
.scoreboard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px 18px;margin-bottom:10px;display:flex;gap:14px;}
.score-col{flex:1;text-align:center;}
.score-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
.score-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:32px;margin:4px 0 2px;}
.score-target{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
.score-bar{height:5px;background:var(--surface-2);border-radius:3px;margin-top:8px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:3px;transition:width .25s;}
.divider-v{width:1px;background:var(--line);}
.remaining-row{display:flex;gap:14px;margin-bottom:18px;}
.remaining-chip{flex:1;background:var(--surface-2);border-radius:10px;padding:9px 10px;text-align:center;}
.remaining-chip .rc-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
.remaining-chip .rc-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);margin-top:2px;}
.remaining-chip.hit .rc-val{color:var(--good);}

.add-food-btn{width:100%;background:var(--accent);color:#1A1006;border:none;border-radius:12px;padding:14px;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;margin-bottom:18px;}
.add-food-btn:active{opacity:.85;}
#fileInput{display:none;}

.log-title{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin:6px 0 10px;}
.food-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.food-item-main{flex:1;}
.food-item-name{font-size:14px;font-weight:500;}
.food-item-macros{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:2px;}
.del-btn{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:4px 6px;}
.empty-msg{text-align:center;color:var(--text-dim);font-size:13px;padding:20px;}

/* Water card */
.water-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.water-info .wt-label{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;}
.water-info .wt-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:3px;}
.toggle{width:46px;height:26px;background:var(--surface-2);border-radius:14px;position:relative;cursor:pointer;flex-shrink:0;border:1px solid var(--line);}
.toggle .knob{width:20px;height:20px;background:var(--text-dim);border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s;}
.toggle.on{background:var(--accent-dim,rgba(255,138,61,.25));}
.toggle.on .knob{left:22px;background:var(--accent);}

/* Analysis modal */
.overlay{position:fixed;inset:0;background:rgba(10,14,11,0.75);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.overlay.active{display:flex;}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:22px 20px 26px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
.sheet h3{font-family:'Oswald',sans-serif;font-size:18px;margin:0 0 4px;}
.sheet .sub{font-size:12px;color:var(--text-dim);margin-bottom:16px;}
.loading-box{text-align:center;padding:30px 10px;}
.spinner{width:36px;height:36px;border:3px solid var(--surface-2);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}
.field{margin-bottom:12px;}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
.field input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:11px 12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;}
.field input:focus{outline:none;border-color:var(--accent);}
.row2{display:flex;gap:10px;}
.row2 .field{flex:1;}
.sheet-actions{display:flex;gap:10px;margin-top:16px;}
.btn{flex:1;padding:13px;border-radius:11px;border:none;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:1px;cursor:pointer;}
.btn-confirm{background:var(--accent);color:#1A1006;}
.btn-cancel{background:var(--surface-2);color:var(--text-dim);}
.err-box{background:rgba(224,96,90,0.12);border:1px solid var(--danger);border-radius:10px;padding:12px;font-size:13px;color:#F0A9A6;margin-bottom:14px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--accent);color:var(--text);padding:11px 18px;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>STAY HARD</h1>
    <div class="date" id="dateLabel"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-view="workout">WORKOUT</div>
    <div class="tab" data-view="fuel">FUEL</div>
  </div>

  <!-- WORKOUT VIEW -->
  <div class="view active" id="view-workout">
    <div class="day-card" id="dayCard"></div>
  </div>

  <!-- FUEL VIEW -->
  <div class="view" id="view-fuel">
    <div class="scoreboard">
      <div class="score-col">
        <div class="score-label">Calories</div>
        <div class="score-num" id="calNum">0</div>
        <div class="score-target" id="calTarget">/ 2900</div>
        <div class="score-bar"><div class="score-bar-fill" id="calBar" style="background:var(--accent);width:0%"></div></div>
      </div>
      <div class="divider-v"></div>
      <div class="score-col">
        <div class="score-label">Protein</div>
        <div class="score-num" id="proNum">0g</div>
        <div class="score-target" id="proTarget">/ 157g</div>
        <div class="score-bar"><div class="score-bar-fill" id="proBar" style="background:var(--chalk2);width:0%"></div></div>
      </div>
    </div>
    <div class="remaining-row">
      <div class="remaining-chip" id="calRemChip">
        <div class="rc-label">Calories Left</div>
        <div class="rc-val" id="calRem">2900</div>
      </div>
      <div class="remaining-chip" id="proRemChip">
        <div class="rc-label">Protein Left</div>
        <div class="rc-val" id="proRem">157g</div>
      </div>
    </div>

    <div class="water-card">
      <div class="water-info">
        <div class="wt-label">💧 Water Reminders</div>
        <div class="wt-sub" id="waterSub">Every 1.5 hrs while app is open</div>
      </div>
      <div class="toggle" id="waterToggle"><div class="knob"></div></div>
    </div>

    <button class="add-food-btn" id="addFoodBtn">+ SCAN FOOD PHOTO</button>
    <input type="file" id="fileInput" accept="image/*" capture="environment">

    <div class="log-title">Today's Log</div>
    <div id="foodList"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ---------------- Data ----------------
const CORE = [
  {n:"Hanging Leg Raises", r:"3 x 12-15"},
  {n:"Cable Woodchoppers", r:"3 x 12/side"},
  {n:"Plank (weighted)", r:"3 x 45-60s"},
  {n:"Bicycle Crunches", r:"3 x 20"}
];

const WORKOUTS = {
  1: {name:"Push Day A", tag:"MON · PUSH", lifts:[
    {n:"DB Bench Press", r:"4 x 8-10"},
    {n:"Incline DB Press", r:"3 x 10"},
    {n:"Machine/Cable Shoulder Press", r:"3 x 10"},
    {n:"DB Lateral Raises", r:"3 x 12-15"},
    {n:"Cable Tricep Pushdown", r:"3 x 12"},
    {n:"Overhead DB Tricep Extension", r:"3 x 10"}
  ]},
  2: {name:"Pull Day A", tag:"TUE · PULL", lifts:[
    {n:"Pull-ups", r:"4 x max/6-10"},
    {n:"Machine/Cable Row", r:"4 x 10"},
    {n:"Single-arm DB Row", r:"3 x 10/side"},
    {n:"Cable Face Pulls", r:"3 x 15"},
    {n:"DB Bicep Curls", r:"3 x 10"},
    {n:"Hammer Curls", r:"3 x 10"}
  ]},
  3: {name:"Leg Day A", tag:"WED · LEGS", lifts:[
    {n:"DB Goblet Squats", r:"4 x 10"},
    {n:"DB Romanian Deadlifts", r:"3 x 10"},
    {n:"Walking DB Lunges", r:"3 x 10/leg"},
    {n:"Leg Press / Bulgarian Split Squat", r:"3 x 10/leg"},
    {n:"Standing Calf Raises", r:"3 x 15-20"}
  ]},
  4: {name:"Push Day B", tag:"THU · PUSH", lifts:[
    {n:"DB Incline Press", r:"4 x 8"},
    {n:"Flat DB Fly", r:"3 x 12"},
    {n:"Arnold Press", r:"3 x 10"},
    {n:"Cable Lateral Raise", r:"3 x 15"},
    {n:"Close-Grip Bench", r:"3 x 10"},
    {n:"Skull Crushers", r:"3 x 10"}
  ]},
  5: {name:"Pull Day B", tag:"FRI · PULL", lifts:[
    {n:"Chin-ups", r:"4 x max/6-10"},
    {n:"Chest-Supported DB Row", r:"4 x 10"},
    {n:"Lat Pulldown / Straight-Arm Pulldown", r:"3 x 12"},
    {n:"Rear Delt Fly (DB)", r:"3 x 15"},
    {n:"Preacher/Incline DB Curl", r:"3 x 10"},
    {n:"Cable/Band Curl", r:"3 x 12"}
  ]},
  6: {name:"Leg Day B", tag:"SAT · LEGS", lifts:[
    {n:"DB Front-Loaded Squats", r:"4 x 10"},
    {n:"Single-Leg RDL (DB)", r:"3 x 10/leg"},
    {n:"Step-Ups (bench)", r:"3 x 10/leg"},
    {n:"Hip Thrusts (bench + DB)", r:"3 x 12"},
    {n:"Seated Calf Raise", r:"3 x 15-20"}
  ]},
  0: {name:"Rest Day", tag:"SUN · REST", lifts:[]}
};

const CAL_TARGET = 2900;
const PRO_TARGET = 157;
const WATER_INTERVAL_MS = 90 * 60 * 1000; // 1.5 hrs

function todayKey(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}

// ---------------- Storage helpers (browser localStorage - persists on this device/browser) ----------------
async function getStore(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}
async function setStore(key, value){
  try{
    localStorage.setItem(key, JSON.stringify(value));
  }catch(e){
    console.error("storage set failed", e);
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

// ---------------- Workout view ----------------
let workoutState = {};
async function renderWorkout(){
  const dow = new Date().getDay();
  const w = WORKOUTS[dow];
  const key = "workout:"+todayKey();
  workoutState = await getStore(key, {});

  const card = document.getElementById('dayCard');
  if(w.lifts.length === 0){
    card.innerHTML = `<div class="day-eyebrow">${w.tag}</div><div class="day-name">${w.name}</div><div class="rest-msg">Rest up. Recovery is where the gains actually happen.</div>`;
    return;
  }

  const allEx = w.lifts.map((e,i)=>({id:'lift-'+i, ...e})).concat(CORE.map((e,i)=>({id:'core-'+i, ...e})));
  const doneCount = allEx.filter(e=>workoutState[e.id]).length;
  const pct = Math.round((doneCount/allEx.length)*100);

  let html = `<div class="day-eyebrow">${w.tag}</div><div class="day-name">${w.name}</div>
  <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="progress-label">${doneCount} / ${allEx.length} COMPLETE</div>
  <div class="ex-group-title">Lifts</div>`;

  w.lifts.forEach((e,i)=>{
    const id = 'lift-'+i;
    const done = !!workoutState[id];
    html += exRow(id, e.n, e.r, done);
  });

  html += `<div class="ex-group-title">Core Finisher</div>`;
  CORE.forEach((e,i)=>{
    const id = 'core-'+i;
    const done = !!workoutState[id];
    html += exRow(id, e.n, e.r, done);
  });

  card.innerHTML = html;

  card.querySelectorAll('.check').forEach(chk=>{
    chk.addEventListener('click', async ()=>{
      const id = chk.dataset.id;
      workoutState[id] = !workoutState[id];
      await setStore(key, workoutState);
      renderWorkout();
    });
  });
}

function exRow(id, name, reps, done){
  return `<div class="ex-row">
    <div class="check ${done?'done':''}" data-id="${id}">${done?'✓':''}</div>
    <div class="ex-info">
      <div class="ex-name ${done?'done':''}">${name}</div>
      <div class="ex-reps">${reps}</div>
    </div>
  </div>`;
}

// ---------------- Fuel view ----------------
let foodLog = [];
async function renderFuel(){
  const key = "food:"+todayKey();
  foodLog = await getStore(key, []);

  const totalCal = foodLog.reduce((s,f)=>s+Number(f.calories||0),0);
  const totalPro = foodLog.reduce((s,f)=>s+Number(f.protein||0),0);

  document.getElementById('calNum').textContent = totalCal;
  document.getElementById('calTarget').textContent = '/ ' + CAL_TARGET;
  document.getElementById('calBar').style.width = Math.min(100,(totalCal/CAL_TARGET)*100)+'%';

  document.getElementById('proNum').textContent = totalPro+'g';
  document.getElementById('proTarget').textContent = '/ ' + PRO_TARGET + 'g';
  document.getElementById('proBar').style.width = Math.min(100,(totalPro/PRO_TARGET)*100)+'%';

  const calRem = CAL_TARGET - totalCal;
  const proRem = PRO_TARGET - totalPro;
  const calRemEl = document.getElementById('calRem');
  const proRemEl = document.getElementById('proRem');
  calRemEl.textContent = calRem <= 0 ? 'Hit! +' + Math.abs(calRem) : calRem;
  proRemEl.textContent = proRem <= 0 ? 'Hit! +' + Math.abs(proRem) + 'g' : proRem + 'g';
  document.getElementById('calRemChip').classList.toggle('hit', calRem <= 0);
  document.getElementById('proRemChip').classList.toggle('hit', proRem <= 0);

  const list = document.getElementById('foodList');
  if(foodLog.length === 0){
    list.innerHTML = `<div class="empty-msg">No food logged yet today. Scan your first plate.</div>`;
    return;
  }
  list.innerHTML = foodLog.map((f,i)=>`
    <div class="food-item">
      <div class="food-item-main">
        <div class="food-item-name">${f.name}</div>
        <div class="food-item-macros">${f.calories} kcal · ${f.protein}g protein · ${f.carbs}g carbs · ${f.fat}g fat</div>
      </div>
      <button class="del-btn" data-i="${i}">✕</button>
    </div>
  `).join('');

  list.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      foodLog.splice(Number(btn.dataset.i),1);
      await setStore(key, foodLog);
      renderFuel();
    });
  });
}

// ---------------- Tabs ----------------
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.view).classList.add('active');
  });
});

// ---------------- Food photo scan ----------------
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');
document.getElementById('addFoodBtn').addEventListener('click', ()=>{
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = '';

  overlay.classList.add('active');
  sheet.innerHTML = `<div class="loading-box"><div class="spinner"></div><div class="loading-text">READING THE PLATE...</div></div>`;

  try{
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';
    const result = await analyzeFood(base64, mediaType);
    showConfirmSheet(result);
  }catch(err){
    console.error(err);
    sheet.innerHTML = `<h3>Couldn't read that photo</h3>
      <div class="err-box">Something went wrong analyzing the image. You can try again or enter the details manually.</div>
      <div class="sheet-actions">
        <button class="btn btn-cancel" id="manualBtn">Enter Manually</button>
        <button class="btn btn-confirm" id="closeErrBtn">Close</button>
      </div>`;
    document.getElementById('closeErrBtn').addEventListener('click', closeSheet);
    document.getElementById('manualBtn').addEventListener('click', ()=>showConfirmSheet({name:'', calories:'', protein:'', carbs:'', fat:''}));
  }
});

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analyzeFood(base64, mediaType){
  const response = await fetch("/api/analyze-food", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ base64, mediaType })
  });
  const data = await response.json();
  if(!response.ok){
    throw new Error(data.error || 'Analysis failed');
  }
  return data;
}

function showConfirmSheet(data){
  sheet.innerHTML = `
    <h3>Confirm this plate</h3>
    <div class="sub">Adjust anything that looks off, then add it to today's log.</div>
    <div class="field"><label>Food</label><input id="f-name" value="${data.name}"></div>
    <div class="row2">
      <div class="field"><label>Calories</label><input id="f-cal" type="number" value="${data.calories}"></div>
      <div class="field"><label>Protein (g)</label><input id="f-pro" type="number" value="${data.protein}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Carbs (g)</label><input id="f-carb" type="number" value="${data.carbs}"></div>
      <div class="field"><label>Fat (g)</label><input id="f-fat" type="number" value="${data.fat}"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-cancel" id="cancelBtn">Discard</button>
      <button class="btn btn-confirm" id="confirmBtn">Add to Log</button>
    </div>
  `;
  document.getElementById('cancelBtn').addEventListener('click', closeSheet);
  document.getElementById('confirmBtn').addEventListener('click', async ()=>{
    const entry = {
      name: document.getElementById('f-name').value || 'Food item',
      calories: Number(document.getElementById('f-cal').value)||0,
      protein: Number(document.getElementById('f-pro').value)||0,
      carbs: Number(document.getElementById('f-carb').value)||0,
      fat: Number(document.getElementById('f-fat').value)||0
    };
    const key = "food:"+todayKey();
    const log = await getStore(key, []);
    log.push(entry);
    await setStore(key, log);
    closeSheet();
    renderFuel();
    showToast('Logged. Numbers updated.');
  });
}

function closeSheet(){
  overlay.classList.remove('active');
}
overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeSheet(); });

// ---------------- Water reminders (while app is open) ----------------
let waterTimer = null;
const waterToggle = document.getElementById('waterToggle');

function startWaterReminders(){
  if(waterTimer) clearInterval(waterTimer);
  waterTimer = setInterval(()=>{
    if(Notification.permission === 'granted'){
      new Notification('💧 Drink water', {body:"Quick sip. Keep the recomp moving.", icon:'icon-192.png'});
    } else {
      showToast('💧 Time to drink water');
    }
  }, WATER_INTERVAL_MS);
}
function stopWaterReminders(){
  if(waterTimer) clearInterval(waterTimer);
  waterTimer = null;
}

waterToggle.addEventListener('click', async ()=>{
  const turningOn = !waterToggle.classList.contains('on');
  if(turningOn){
    if('Notification' in window && Notification.permission !== 'granted'){
      await Notification.requestPermission();
    }
    waterToggle.classList.add('on');
    startWaterReminders();
    await setStore('waterOn', true);
    showToast('Water reminders on');
  } else {
    waterToggle.classList.remove('on');
    stopWaterReminders();
    await setStore('waterOn', false);
    showToast('Water reminders off');
  }
});

// ---------------- Init ----------------
document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'});
renderWorkout();
renderFuel();
getStore('waterOn', false).then(on=>{
  if(on){
    waterToggle.classList.add('on');
    startWaterReminders();
  }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js').catch(()=>{});
}
</script>
